<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGIS Fasilitas Kesehatan & Mpox - Kinshasa, DRC</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    #map { width: 100%; height: 100vh; }
    
    /* Header Stats */
    .header-stats {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 12px 24px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      display: flex;
      gap: 20px;
      color: white;
      font-size: 14px;
    }
    .stat-item {
      text-align: center;
      padding: 0 10px;
      border-right: 1px solid rgba(255,255,255,0.3);
    }
    .stat-item:last-child { border-right: none; }
    .stat-value { font-size: 20px; font-weight: bold; }
    .stat-label { font-size: 11px; opacity: 0.9; }
    
    /* Control Panel */
    .control-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      max-width: 280px;
      font-size: 13px;
    }
    .control-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 8px;
    }
    .filter-group { margin-bottom: 12px; }
    .filter-label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
    }
    .filter-item {
      display: flex;
      align-items: center;
      margin: 4px 0;
      cursor: pointer;
    }
    .filter-item input { margin-right: 8px; cursor: pointer; }
    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }
    
    /* Search Box */
    .search-box {
      width: 100%;
      padding: 8px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .search-box:focus {
      outline: none;
      border-color: #667eea;
    }
    
    /* Legend */
    .legend-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin: 5px 0;
      cursor: pointer;
    }
    .legend-item:hover { opacity: 0.7; }
    .mpox-circle {
      width: 18px;
      height: 18px;
      border: 2px solid #990000;
      border-radius: 50%;
      margin-right: 8px;
      display: inline-block;
    }
    
    /* Popup Styling */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .popup-header {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid #667eea;
    }
    .popup-row {
      margin: 4px 0;
      font-size: 13px;
    }
    .popup-label {
      font-weight: 600;
      color: #666;
    }
    .mpox-popup { border-left: 4px solid #e74c3c; padding-left: 10px; }
    .faskes-popup { border-left: 4px solid #3498db; padding-left: 10px; }
    
    /* Loading */
    .loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header-stats {
        flex-direction: column;
        gap: 8px;
        padding: 10px;
        font-size: 12px;
      }
      .stat-value { font-size: 16px; }
      .control-panel {
        max-width: 90%;
        right: 5px;
        left: 5px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading" class="loading">
    <div>
      <div class="loading-spinner"></div>
      <p style="color: white; margin-top: 10px; text-align: center;">Loading WebGIS...</p>
    </div>
  </div>

  <!-- Header Stats -->
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-value" id="total-faskes">0</div>
      <div class="stat-label">Fasilitas Kesehatan</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="total-hospital">0</div>
      <div class="stat-label">Rumah Sakit</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="total-clinic">0</div>
      <div class="stat-label">Klinik</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="total-pharmacy">0</div>
      <div class="stat-label">Apotek</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="total-mpox">0</div>
      <div class="stat-label">Kasus Mpox</div>
    </div>
  </div>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="control-title">🎛️ Kontrol Peta</div>
    
    <!-- Search -->
    <input type="text" id="searchBox" class="search-box" placeholder="🔍 Cari fasilitas kesehatan...">
    
    <!-- Filters -->
    <div class="filter-group">
      <span class="filter-label">🏥 Filter Fasilitas:</span>
      <label class="filter-item">
        <input type="checkbox" id="chkHospital" checked onchange="toggleLayer('hospital')">
        <span class="color-dot" style="background:#e74c3c;"></span> Rumah Sakit
      </label>
      <label class="filter-item">
        <input type="checkbox" id="chkClinic" checked onchange="toggleLayer('clinic')">
        <span class="color-dot" style="background:#3498db;"></span> Klinik / Puskesmas
      </label>
      <label class="filter-item">
        <input type="checkbox" id="chkPharmacy" checked onchange="toggleLayer('pharmacy')">
        <span class="color-dot" style="background:#2ecc71;"></span> Apotek / Farmasi
      </label>
      <label class="filter-item">
        <input type="checkbox" id="chkOther" checked onchange="toggleLayer('other')">
        <span class="color-dot" style="background:#f39c12;"></span> Lainnya
      </label>
    </div>
    
    <!-- Legend -->
    <div class="legend-section">
      <div class="control-title"> Kasus Mpox (2024)</div>
      <div class="legend-item">
        <span class="mpox-circle" style="background:rgba(231,76,60,0.8); width:24px; height:24px;"></span>
        5 kasus (Limete)
      </div>
      <div class="legend-item">
        <span class="mpox-circle" style="background:rgba(231,76,60,0.5);"></span>
        1-2 kasus
      </div>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  
  <script>
    // Global variables
    let markerClusters = null;
    let mpoxLayer = null;
    let allMarkers = [];
    let visibleTypes = { hospital: true, clinic: true, pharmacy: true, other: true };

    // Initialize map
    const map = L.map('map').setView([-4.39, 15.30], 12);
    
    // Basemap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // Helper functions
    function getHealthcareType(props) {
      const h = (props.healthcare || '').toLowerCase();
      const a = (props.amenity || '').toLowerCase();
      if (h.includes('hospital') || a === 'hospital') return 'hospital';
      if (h.includes('clinic') || h.includes('health_centre') || a === 'clinic') return 'clinic';
      if (h.includes('pharmacy') || a === 'pharmacy') return 'pharmacy';
      return 'other';
    }

    function getColor(type) {
      const colors = { hospital: '#e74c3c', clinic: '#3498db', pharmacy: '#2ecc71', other: '#f39c12' };
      return colors[type] || '#f39c12';
    }

    function isHealthcare(props) {
      return props.healthcare || ['hospital','clinic','pharmacy','doctors','dentist','nursing_home'].includes(props.amenity);
    }

    // Statistics counters
    const stats = { total: 0, hospital: 0, clinic: 0, pharmacy: 0, other: 0 };

    // Create marker with popup
    function createMarker(feature, latlng) {
      const type = getHealthcareType(feature.properties);
      const color = getColor(type);
      const props = feature.properties;
      
      const marker = L.circleMarker(latlng, {
        radius: 7,
        fillColor: color,
        color: '#fff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.85,
        'data-type': type
      });

      // Build popup content
      const typeName = { hospital: 'Rumah Sakit', clinic: 'Klinik', pharmacy: 'Apotek', other: 'Fasilitas Kesehatan' }[type];
      let popupHTML = `<div class="faskes-popup"><div class="popup-header">🏥 ${typeName}</div>`;
      if (props.name) popupHTML += `<div class="popup-row"><span class="popup-label">Nama:</span> ${props.name}</div>`;
      if (props.operator) popupHTML += `<div class="popup-row"><span class="popup-label">Operator:</span> ${props.operator}</div>`;
      if (props.phone) popupHTML += `<div class="popup-row"><span class="popup-label">Telepon:</span> ${props.phone}</div>`;
      if (props.opening_hours) popupHTML += `<div class="popup-row"><span class="popup-label">Jam Buka:</span> ${props.opening_hours}</div>`;
      if (props.addr_street) popupHTML += `<div class="popup-row"><span class="popup-label">Alamat:</span> ${props.addr_street}</div>`;
      popupHTML += `</div>`;

      marker.bindPopup(popupHTML);
      
      // Update stats
      stats.total++;
      stats[type]++;
      allMarkers.push({ marker, type, name: (props.name || '').toLowerCase(), element: marker });
      
      return marker;
    }

    // Load Healthcare Facilities with Clustering
    fetch('data/kinshasa_health_full.geojson')
      .then(res => res.json())
      .then(data => {
        markerClusters = L.markerClusterGroup({
          maxClusterRadius: 50,
          spiderfyOnMaxZoom: true,
          showCoverageOnHover: false,
          zoomToBoundsOnClick: true
        });

        L.geoJSON(data, {
          filter: (feature) => isHealthcare(feature.properties),
          pointToLayer: createMarker
        }).addTo(markerClusters);

        markerClusters.addTo(map);
        
        // Update statistics
        document.getElementById('total-faskes').textContent = stats.total.toLocaleString();
        document.getElementById('total-hospital').textContent = stats.hospital.toLocaleString();
        document.getElementById('total-clinic').textContent = stats.clinic.toLocaleString();
        document.getElementById('total-pharmacy').textContent = stats.pharmacy.toLocaleString();
        
        console.log('✅ Facilities loaded:', stats);
      })
      .catch(err => console.error('❌ Error loading facilities:', err));

    // Load Mpox Data
    fetch('data/kinshasa_mpox_2024.geojson')
      .then(res => res.json())
      .then(mpoxData => {
        mpoxLayer = L.geoJSON(mpoxData, {
          pointToLayer: (feature, latlng) => {
            const cases = feature.properties.cases;
            const radius = Math.min(cases * 10, 50);
            
            return L.circleMarker(latlng, {
              radius: radius,
              fillColor: '#e74c3c',
              color: '#990000',
              weight: 3,
              opacity: 0.9,
              fillOpacity: 0.5
            });
          },
          onEachFeature: (feature, layer) => {
            const props = feature.properties;
            const popupHTML = `
              <div class="mpox-popup">
                <div class="popup-header">🦠 Kasus Mpox - ${props.name}</div>
                <div class="popup-row"><span class="popup-label">Jumlah Kasus:</span> <strong>${props.cases}</strong></div>
                <div class="popup-row"><span class="popup-label">Clade Virus:</span> ${props.clade}</div>
                <div class="popup-row"><span class="popup-label">Info:</span> ${props.info}</div>
                <div style="margin-top:8px; font-size:11px; color:#666;">Periode: Juli-Agustus 2024<br>Sumber: Eurosurveillance 2024</div>
              </div>
            `;
            layer.bindPopup(popupHTML);
          }
        }).addTo(map);

        document.getElementById('total-mpox').textContent = mpoxData.features.length;
        document.getElementById('loading').style.display = 'none';
      })
      .catch(err => {
        console.warn('⚠️ Mpox data not found:', err);
        document.getElementById('loading').style.display = 'none';
      });

    // Toggle layer visibility
    function toggleLayer(type) {
      visibleTypes[type] = document.getElementById('chk' + type.charAt(0).toUpperCase() + type.slice(1)).checked;
      
      if (markerClusters) {
        markerClusters.clearLayers();
        
        allMarkers.forEach(item => {
          if (visibleTypes[item.type]) {
            markerClusters.addLayer(item.marker);
          }
        });
        
        map.addLayer(markerClusters);
      }
    }

    // Search functionality
    document.getElementById('searchBox').addEventListener('input', function(e) {
      const query = e.target.value.toLowerCase();
      
      if (query.length < 2) return;
      
      const found = allMarkers.find(item => item.name.includes(query));
      if (found && visibleTypes[found.type]) {
        map.setView(found.marker.getLatLng(), 16);
        found.marker.openPopup();
      }
    });
  </script>
</body>
</html>
